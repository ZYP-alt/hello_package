name: Docker CI/CD

# 1. 触发条件
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# 2. 定义环境变量
env:
  REGISTRY: ghcr.io                  # 使用 GitHub 容器仓库
  IMAGE_NAME: ${{ github.repository }} # 镜像名，格式：用户名/仓库名

jobs:
  # Job 1: 代码质量检查 (复用你之前的配置)
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      
      - name: Lint & Format Check
        run: |
          black --check .
          isort --check-only .
          flake8 .
      
      - name: Run tests
        run: pytest

  # Job 2: Docker 镜像构建与推送 (依赖于测试通过)
  docker:
    needs: test                     # 只有 test Job 成功后才执行
    runs-on: ubuntu-latest
    # 仅在推送到 main 分支时才执行推送，PR 只进行构建测试
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write              # 允许向 GHCR (GitHub Container Registry) 推送

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动生成的 Token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
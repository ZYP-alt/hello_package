# ============================================================
# 工作流名称
# ============================================================
name: CI/CD Pipeline

# ============================================================
# 触发条件
# ============================================================
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ============================================================
# 环境变量
# ============================================================
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ============================================================
# 任务1：代码质量检查（测试矩阵）
# ============================================================
jobs:
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # 1.1 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 1.2 设置 Python 版本
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 1.3 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      # 1.4 检查代码格式 (Black)
      - name: Check formatting with Black
        run: python -m black --check .

      # 1.5 检查 import 排序 (isort)
      - name: Check import sorting with isort
        run: python -m isort --check-only .

      # 1.6 代码静态检查 (flake8)
      - name: Lint with flake8
        run: python -m flake8 .

      # 1.7 运行单元测试 (pytest)
      - name: Run tests
        run: python -m pytest

  # ============================================================
  # 任务2：Docker 镜像构建和推送
  # ============================================================
  docker:
    name: Build & Push Docker Image
    needs: test  # 只有测试通过后才执行
    runs-on: ubuntu-latest

    # 只在推送到 main 分支时执行（PR 只跑测试，不推送镜像）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write  # 允许向 GitHub Container Registry 推送

    steps:
      # 2.1 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2.2 将镜像名转为小写（修复 Docker 命名规范问题）
      - name: Convert image name to lowercase
        id: image_name
        run: |
          IMAGE=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Converted to: $IMAGE"

      # 2.3 登录到 GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2.4 设置 Docker Buildx（支持多平台构建和缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2.5 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2.6 可选：打印镜像信息（便于调试）
      - name: Show image info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image }}"
          echo "Tags: latest, ${{ github.sha }}, ${{ github.ref_name }}"